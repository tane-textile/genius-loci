<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Loci — tané textile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<style>
:root{--ecru:#F4F1E8;--sumi:#2C2C2C;--kakishibu:#A65E44;--moss:#7C866B;--paper:#FAF8F2;--border:#e0ddd5;--font-sans:'YuMincho','Hiragino Mincho ProN','Times New Roman',serif;--font-serif:'YuMincho','Hiragino Mincho ProN','Times New Roman',serif;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:var(--font-sans);background:var(--ecru);color:var(--sumi);line-height:1.6;}
#genius-loci-app{max-width:1200px;margin:0 auto;padding:24px 16px 48px;}

/* ── Loading Overlay ── */
.gl-loading{position:fixed;inset:0;z-index:100;background:var(--ecru);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s;}
.gl-loading.hidden{opacity:0;pointer-events:none;}
.gl-loading .sub{font-size:13px;color:#888;margin-bottom:24px;font-family:var(--font-serif);}
.gl-loading .status{font-size:12px;color:var(--kakishibu);margin-top:16px;min-height:20px;}
.gl-loading .progress-bar{width:240px;height:3px;background:var(--border);border-radius:2px;margin-top:16px;overflow:hidden;}
.gl-loading .progress-fill{height:100%;background:var(--kakishibu);border-radius:2px;transition:width 0.3s;width:0%;}
.gl-loading .count-info{font-size:11px;color:#999;margin-top:8px;}

/* ── Header ── */
.gl-header{text-align:center;margin-bottom:32px;}
.gl-header .gl-logo{width:200px;margin-bottom:12px;}
.gl-header h1{font-family:var(--font-serif);font-size:15px;font-weight:400;letter-spacing:3px;color:#888;margin-bottom:6px;}
.gl-header .gl-subtitle{font-size:14px;color:#888;line-height:1.8;}

/* ── Input Form ── */
.gl-input-section{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:24px;}
.gl-input-section h2{font-family:var(--font-serif);font-size:16px;font-weight:400;margin-bottom:16px;color:var(--sumi);}
.gl-form-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px;}
.gl-form-group{display:flex;flex-direction:column;gap:4px;}
.gl-form-group label{font-size:11px;color:#888;letter-spacing:0.5px;}
.gl-form-group input{border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:14px;font-family:var(--font-sans);background:#fff;color:var(--sumi);width:160px;}
.gl-form-group input:focus{outline:none;border-color:var(--kakishibu);}
.gl-generate-btn{background:var(--sumi);color:var(--paper);border:none;border-radius:20px;padding:10px 28px;font-size:13px;font-family:var(--font-sans);cursor:pointer;letter-spacing:1px;transition:background 0.2s;}
.gl-generate-btn:hover{background:var(--kakishibu);}
.gl-generate-btn:disabled{background:#aaa;cursor:wait;}
.gl-landmarks{display:flex;flex-wrap:wrap;gap:6px;}
.gl-landmarks button{background:none;border:1px solid var(--border);border-radius:14px;padding:4px 12px;font-size:11px;font-family:var(--font-sans);cursor:pointer;color:#666;transition:all 0.2s;}
.gl-landmarks button:hover{border-color:var(--kakishibu);color:var(--kakishibu);}

/* ── Canvas Container ── */
.gl-canvas-wrap{position:relative;width:100%;margin-bottom:24px;}
.gl-canvas-wrap canvas{display:block;width:100%!important;height:auto!important;}

/* ── Gallery Overlay ── */
.gallery-overlay{position:fixed;inset:0;z-index:50;background:rgba(244,241,232,0.97);display:none;flex-direction:column;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.gallery-overlay.active{display:flex;}
.gallery-header{padding:20px 24px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.gallery-header h2{font-family:var(--font-serif);font-size:18px;font-weight:400;}
.gallery-header .close-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 18px;font-size:12px;cursor:pointer;font-family:var(--font-sans);color:var(--sumi);}
.gallery-info{padding:12px 24px;font-size:11px;color:#888;flex-shrink:0;display:flex;align-items:center;gap:16px;}
.gallery-grid-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 24px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;}
.gallery-cell{aspect-ratio:1;background:#fff;border:1px solid var(--border);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s,transform 0.15s;overflow:hidden;position:relative;}
.gallery-cell:hover{transform:scale(1.04);border-color:#bbb;}
.gallery-cell.current{border:2px solid var(--kakishibu);}
.gallery-cell canvas{width:100%;height:auto;}
.gallery-cell .cell-label{font-size:7px;color:#999;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.gallery-cell .cell-dist{position:absolute;top:2px;right:2px;font-size:7px;color:var(--kakishibu);background:rgba(244,241,232,0.85);padding:1px 3px;border-radius:2px;}
.gallery-count{font-size:10px;color:var(--kakishibu);font-weight:500;}

/* ── Confirmation / Order Modal ── */
.gl-confirm-overlay{position:fixed;inset:0;z-index:60;background:rgba(44,44,44,0.5);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.gl-confirm-overlay.active{display:flex;}
.gl-confirm-panel{background:var(--paper);border-radius:12px;max-width:560px;width:90%;max-height:90vh;overflow-y:auto;padding:32px;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.gl-confirm-panel h2{font-family:var(--font-serif);font-size:20px;font-weight:400;margin-bottom:20px;text-align:center;}
.gl-confirm-image{width:100%;max-width:400px;margin:0 auto 20px;display:block;border:1px solid var(--border);border-radius:4px;}
.gl-confirm-details{margin-bottom:20px;}
.gl-confirm-details dt{font-size:11px;color:#888;margin-top:12px;}
.gl-confirm-details dd{font-size:14px;color:var(--sumi);margin-top:2px;}
.gl-confirm-code{font-family:'Courier New',monospace;font-size:16px;color:var(--kakishibu);font-weight:bold;letter-spacing:1px;background:var(--ecru);padding:8px 16px;border-radius:4px;display:inline-block;}
.gl-confirm-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:24px;}
.gl-confirm-actions button{border:none;border-radius:20px;padding:10px 24px;font-size:13px;font-family:var(--font-sans);cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;}
.gl-btn-primary{background:var(--sumi);color:var(--paper);}
.gl-btn-primary:hover{background:var(--kakishibu);}
.gl-btn-secondary{background:none;border:1px solid var(--border)!important;color:var(--sumi);}
.gl-btn-secondary:hover{border-color:var(--kakishibu)!important;color:var(--kakishibu);}
.gl-btn-cart{background:var(--kakishibu);color:#fff;}
.gl-btn-cart:hover{background:#8B4E38;}
.gl-confirm-close{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;}
.gl-orgs-list{list-style:none;padding:0;display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.gl-orgs-list li{background:var(--ecru);padding:2px 10px;border-radius:12px;font-size:11px;color:#666;}

/* ── Double-check Section ── */
.gl-doublecheck{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-top:24px;}
.gl-doublecheck h2{font-family:var(--font-serif);font-size:16px;font-weight:400;margin-bottom:8px;}
.gl-doublecheck p{font-size:12px;color:#888;margin-bottom:12px;}
.gl-doublecheck-row{display:flex;gap:8px;align-items:center;}
.gl-doublecheck-row input{border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:14px;font-family:'Courier New',monospace;flex:1;max-width:360px;}
.gl-doublecheck-row input:focus{outline:none;border-color:var(--kakishibu);}

/* ── Toast ── */
.gl-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sumi);color:var(--paper);padding:10px 24px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
.gl-toast.show{opacity:1;}

/* ── Lightbox (garment popup) ── */
.gl-lightbox{position:fixed;inset:0;z-index:80;background:rgba(44,44,44,0.7);display:none;align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.gl-lightbox.active{display:flex;}
.gl-lightbox canvas,.gl-lightbox img{max-width:90vw;max-height:90vh;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,0.3);}
.gl-lightbox-close{position:fixed;top:20px;right:24px;z-index:81;width:40px;height:40px;border:none;border-radius:50%;background:rgba(255,255,255,0.9);color:var(--sumi);font-size:22px;line-height:40px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:none;transition:background 0.2s;}
.gl-lightbox.active .gl-lightbox-close{display:block;}
.gl-lightbox-close:hover{background:#fff;}

/* ─��� Responsive ── */
@media(max-width:768px){
  #genius-loci-app{padding:16px 12px 32px;}
  .gl-form-group input{width:120px;}
  .gl-confirm-panel{padding:20px;}
}
</style>
</head>

let v10OrgmapPixels=null,v10MaskPixels=null,v10OrgmapImg=null;

function loadV10Images(){
  return new Promise(resolve=>{
    let loaded=0;const done=()=>{if(++loaded>=2)resolve();};
    const o=new Image();o.onload=()=>{
      const c=document.createElement('canvas');c.width=V10_SRC_W;c.height=V10_SRC_H;
      const x=c.getContext('2d');x.drawImage(o,0,0,V10_SRC_W,V10_SRC_H);
      const d=x.getImageData(0,0,V10_SRC_W,V10_SRC_H);
      v10OrgmapPixels=new Float32Array(V10_SRC_W*V10_SRC_H);
      for(let i=0;i<V10_SRC_W*V10_SRC_H;i++)v10OrgmapPixels[i]=(d.data[i*4]+d.data[i*4+1]+d.data[i*4+2])/(3*255);
      done();};o.src=V10_ORGMAP_SRC;v10OrgmapImg=o;
    const m=new Image();m.onload=()=>{
      const c=document.createElement('canvas');c.width=V10_SRC_W;c.height=V10_SRC_H;
      const x=c.getContext('2d');x.drawImage(m,0,0,V10_SRC_W,V10_SRC_H);
      const d=x.getImageData(0,0,V10_SRC_W,V10_SRC_H);
      v10MaskPixels=new Float32Array(V10_SRC_W*V10_SRC_H);
      for(let i=0;i<V10_SRC_W*V10_SRC_H;i++)v10MaskPixels[i]=d.data[i*4]/255;
      done();};m.src=V10_MASK_SRC;
  });
}

// ── Sampling ──
function sampleOrgmap(hx,hy){
  if(!v10OrgmapPixels)return 0.5;
  const sx=hx/V10_SCALE,sy=hy/V10_SCALE;
  const x0=Math.floor(sx),y0=Math.floor(sy);
  const x1=Math.min(x0+1,V10_SRC_W-1),y1=Math.min(y0+1,V10_SRC_H-1);
  const fx=sx-x0,fy=sy-y0;
  return v10OrgmapPixels[y0*V10_SRC_W+x0]*(1-fx)*(1-fy)+v10OrgmapPixels[y0*V10_SRC_W+x1]*fx*(1-fy)+v10OrgmapPixels[y1*V10_SRC_W+x0]*(1-fx)*fy+v10OrgmapPixels[y1*V10_SRC_W+x1]*fx*fy;
}
function sampleMask(hx,hy){
  if(!v10MaskPixels)return 0;
  const sx=Math.round(hx/V10_SCALE),sy=Math.round(hy/V10_SCALE);
  if(sx<0||sx>=V10_SRC_W||sy<0||sy>=V10_SRC_H)return 0;
  return v10MaskPixels[sy*V10_SRC_W+sx]>0.5?1:0;
}

const PLAIN_WEAVE={id:'plain',name:'Plain Weave',hardness:1.0,interlacement:1.0,face_balance:0.5,diagonal_tendency:0.0,directional_bias:0.5,float_variance:0.0,width:2,height:2,drawdown:[[true,false],[false,true]]};
function decodeDrawdown(b){const bin=atob(b);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);const w=(a[0]<<8)|a[1],h=(a[2]<<8)|a[3],d=a.slice(4);const dd=[];let bi=0;for(let r=0;r<h;r++){const row=[];for(let c=0;c<w;c++){row.push(!!((d[bi>>3]>>(7-(bi&7)))&1));bi++;}dd.push(row);}return{w,h,drawdown:dd};}
function getDecodedPattern(p){if(p.drawdown)return p;if(decodedCache.has(p.id)){const c=decodedCache.get(p.id);return{...p,width:c.w,height:c.h,drawdown:c.drawdown};}if(!p.drawdown_base64)return p;const d=decodeDrawdown(p.drawdown_base64);decodedCache.set(p.id,d);return{...p,width:d.w,height:d.h,drawdown:d.drawdown};}
function seededRandom(s){s>>>=0;s^=s<<13;s^=s>>>17;s^=s<<5;return(s>>>0)/4294967296;}
function coordSeed(lat,lng){let h=0;const s=lat.toFixed(6)+','+lng.toFixed(6);for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h);}

function selectPatternsLazy(count,seed){
  if(!safePatterns||safePatterns.length===0){slotCandidates=[];return[PLAIN_WEAVE];}
  slotCandidates=[];const sel=[];
  for(let i=0;i<count;i++){
    const hMin=i/count,hMax=(i+1)/count;const ci=[];
    for(let j=0;j<safePatterns.length;j++)if(safePatterns[j].hardness>=hMin&&safePatterns[j].hardness<hMax)ci.push(j);
    if(ci.length>0){const idx=ci[Math.floor(seededRandom(seed+i)*ci.length)];sel.push(getDecodedPattern(safePatterns[idx]));slotCandidates.push({candidateCount:ci.length,h_min:hMin,h_max:hMax});}
  }
  if(!sel.find(p=>p.hardness>0.95)){slotCandidates.push({candidateCount:1,h_min:0.95,h_max:1.0});sel.push(PLAIN_WEAVE);}
  sel.sort((a,b)=>a.hardness-b.hardness);slotCandidates.sort((a,b)=>a.h_min-b.h_min);return sel;

const PROFILE_KEYS=['hardness','interlacement','face_balance','diagonal_tendency','directional_bias','float_variance'];
function calcSimilarity(a,b){let d=0;for(const k of PROFILE_KEYS){const va=a[k]!==undefined?a[k]:0.5,vb=b[k]!==undefined?b[k]:0.5;d+=(va-vb)**2;}return Math.sqrt(d);}

function resizeDrawdown(dd,sw,sh,ds){if(ds===0)return{drawdown:dd,w:sw,h:sh};const o=[];for(let r=0;r<ds;r++){const sr=Math.floor(r*sh/ds)%sh;const row=[];for(let c=0;c<ds;c++){row.push(dd[sr][Math.floor(c*sw/ds)%sw]);}o.push(row);}return{drawdown:o,w:ds,h:ds};}

function getArchiveValue(x,y,brightness,patterns,tileSize,blendWidth,seed){
  const ht=1.0-brightness;const ty=Math.floor(y/2);
  if(patterns.length===0)return{val:((x+ty)%2===0)?1:0,idx:-1};
  if(patterns.length===1){const p=patterns[0];const r=resizeDrawdown(p.drawdown,p.width,p.height,tileSize);return{val:r.drawdown[ty%r.h][x%r.w]?1:0,idx:0};}
  let idxA=0,minD=Infinity;for(let i=0;i<patterns.length;i++){const d=Math.abs(patterns[i].hardness-ht);if(d<minD){minD=d;idxA=i;}}
  let idxB;if(idxA>0&&idxA<patterns.length-1){idxB=Math.abs(patterns[idxA-1].hardness-ht)<Math.abs(patterns[idxA+1].hardness-ht)?idxA-1:idxA+1;}else if(idxA===0){idxB=1;}else{idxB=idxA-1;}
  const pA=patterns[idxA],pB=patterns[idxB];const dA=Math.abs(ht-pA.hardness),dB=Math.abs(ht-pB.hardness);const tot=dA+dB;
  let useA;if(tot<0.001||blendWidth===0){useA=true;}else{const rA=dB/tot;const bz=blendWidth/512;if(Math.min(dA,dB)>bz)useA=rA>0.5;else useA=seededRandom(x*73856093^ty*19349663^(seed&0xFFFF))<rA;}
  const ci=useA?idxA:idxB;const ch=patterns[ci];const r=resizeDrawdown(ch.drawdown,ch.width,ch.height,tileSize);
  return{val:r.drawdown[ty%r.h][x%r.w]?1:0,idx:ci};
}

function makeGarmentMask(gw,gh){const m=new Float32Array(gw*gh);for(let y=0;y<gh;y++)for(let x=0;x<gw;x++)m[y*gw+x]=sampleMask(x,y);return m;}

function generateGarmentPattern(p5i,lat,lng,gw,gh){
  const seed=coordSeed(lat,lng);p5i.noiseSeed(seed);p5i.randomSeed(seed);
  const mask=makeGarmentMask(gw,gh);const patterns=selectPatternsLazy(GL.patternCount,seed);selectedPatterns=patterns;
  const grid=new Int8Array(gw*gh).fill(-1);const brightMap=new Float32Array(gw*gh);const draftIdxMap=new Int8Array(gw*gh).fill(-1);
  for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){const idx=y*gw+x;if(mask[idx]<0.5)continue;let b=sampleOrgmap(x,y);b=Math.max(0,Math.min(1,(b-0.5)*GL.contrast+0.5));brightMap[idx]=b;}
  for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){const idx=y*gw+x;if(mask[idx]<0.5)continue;let b=brightMap[idx];const ty=Math.floor(y/2);
    if(b<0.08){grid[idx]=((x+ty)%2===0)?1:0;draftIdxMap[idx]=patterns.length-1;}
    else{let pn1=p5i.noise(x*GL.perturbScale1+500,y*GL.perturbScale1+500),pn2=p5i.noise(x*GL.perturbScale2+800,y*GL.perturbScale2+800);
      let pb=Math.max(0.01,Math.min(0.99,b+((pn1*0.6+pn2*0.4)*2-1)*GL.perturbAmount));pb=Math.pow(pb,GL.softGamma);
      const r=getArchiveValue(x,y,pb,patterns,GL.tileSize,GL.blendWidth,seed);grid[idx]=r.val;draftIdxMap[idx]=r.idx;}}
  return{grid,mask,brightMap,draftIdxMap,patterns,w:gw,h:gh,seed,lat,lng};
}

function renderGarmentImage(p5i,gd,hlIdx){
  const img=p5i.createImage(gd.w,gd.h);img.loadPixels();
  for(let y=0;y<gd.h;y++)for(let x=0;x<gd.w;x++){const idx=y*gd.w+x;const pi=idx*4;
    if(gd.mask[idx]<0.5||gd.grid[idx]<0){img.pixels[pi]=0;img.pixels[pi+1]=0;img.pixels[pi+2]=0;img.pixels[pi+3]=0;continue;}
    const wV=gd.grid[idx];let c=wV===1?44:230;
    if(hlIdx>=0&&gd.draftIdxMap[idx]===hlIdx){img.pixels[pi]=Math.floor(c*.75+166*.25);img.pixels[pi+1]=Math.floor(c*.75+94*.25);img.pixels[pi+2]=Math.floor(c*.75+68*.25);}
    else{img.pixels[pi]=c;img.pixels[pi+1]=c;img.pixels[pi+2]=c;}img.pixels[pi+3]=255;}
  img.updatePixels();return img;
}

function generatePatternCode(lat,lng,seed){
  const seedHex=((seed&0xFFFF).toString(16)).toUpperCase().padStart(4,'0');
  const swapSuffix=patternSwaps.length>0?'-S'+patternSwaps.length:'';

function parsePatternCode(code){
  const m=code.match(/^GL-([-\d.]+)-([-\d.]+)-([A-F0-9]{4})(-S(\d+))?$/i);

  return{lat:parseFloat(m[1]),lng:parseFloat(m[2]),seedHex:m[3],swapCount:m[5]?parseInt(m[5]):0};
}

      p.line(s*.2,-s*.42,s*.18,-s*.34);p.line(s*.18,-s*.34,s*.22,-s*.3);p.line(s*.22,-s*.3,s*.2,-s*.22);
      p.strokeWeight(sw);
      break;
    case 'pyramid':
      // Pyramids - three
      p.fill(200,197,189,30);
      // Large
      p.beginShape();p.vertex(-s*.15,0);p.vertex(s*.15,-s*.8);p.vertex(s*.45,0);p.endShape(p.CLOSE);
      // Medium
      p.beginShape();p.vertex(s*.3,0);p.vertex(s*.5,-s*.55);p.vertex(s*.7,0);p.endShape(p.CLOSE);
      // Small
      p.beginShape();p.vertex(s*.55,0);p.vertex(s*.68,-s*.35);p.vertex(s*.8,0);p.endShape(p.CLOSE);
      p.noFill();
      break;
    case 'liberty':
      // Statue of Liberty
      // pedestal
      p.line(-s*.12,0,-s*.1,-s*.3);p.line(s*.12,0,s*.1,-s*.3);
      p.line(-s*.1,-s*.3,s*.1,-s*.3);
      // body
      p.line(-s*.08,-s*.3,-s*.06,-s*.7);p.line(s*.08,-s*.3,s*.06,-s*.7);
      // head
      p.ellipse(0,-s*.78,s*.14,s*.16);
      // crown spikes
      for(let a=-2.5;a<=0.5;a+=0.5){const ax=a-0.3;p.line(Math.cos(ax)*s*.07,-s*.78+Math.sin(ax)*s*.08,Math.cos(ax)*s*.14,-s*.78+Math.sin(ax)*s*.15);}
      // torch arm
      p.line(s*.06,-s*.65,s*.2,-s*.95);p.line(s*.18,-s*1.0,s*.22,-s*1.0);
      // flame
      p.fill(166,94,68,80);p.ellipse(s*.2,-s*1.05,s*.06,s*.1);p.noFill();
      break;
    case 'opera':
      // Sydney Opera House - sail shapes
      for(let i=0;i<3;i++){
        const ox=i*s*.18-s*.15;
        p.beginShape();
        p.vertex(ox,0);
        p.bezierVertex(ox,-s*.2,ox+s*.05,-s*.6,ox+s*.08,-s*.75+i*s*.08);
        p.bezierVertex(ox+s*.12,-s*.5,ox+s*.15,-s*.15,ox+s*.18,0);
        p.endShape();
      }
      // base platform
      p.line(-s*.25,0,s*.45,0);
      break;
    case 'colosseum':
      // Colosseum - arched facade
      p.arc(0,-s*.15,s*.8,s*.7,-Math.PI,0);
      p.line(-s*.4,-s*.15,-s*.4,s*.05);p.line(s*.4,-s*.15,s*.4,s*.05);
      p.line(-s*.42,s*.05,s*.42,s*.05);

      for(let i=-2;i<=2;i++){p.arc(i*s*.14,-s*.02,s*.12,s*.14,-Math.PI,0);}

      for(let i=-1;i<=1;i++){p.arc(i*s*.18,-s*.2,s*.1,s*.1,-Math.PI,0);}
      break;
    case 'christ':
      // Cristo Redentor
      // mountain
      p.fill(200,197,189,30);
      p.beginShape();p.vertex(-s*.5,s*.1);p.bezierVertex(-s*.3,-s*.2,s*.3,-s*.2,s*.5,s*.1);p.endShape();
      p.noFill();
      // figure
      p.strokeWeight(1.5);
      p.line(0,-s*.15,0,-s*.6);// body
      p.line(-s*.35,-s*.5,s*.35,-s*.5);// arms
      // head
      p.ellipse(0,-s*.68,s*.1,s*.12);
      p.strokeWeight(1.2);
      break;
    case 'wall':
      // Great Wall - winding path with towers
      p.beginShape();p.noFill();
      p.vertex(-s*.5,-s*.1);
      p.bezierVertex(-s*.3,-s*.35,-s*.1,-s*.15,s*.1,-s*.35);
      p.bezierVertex(s*.25,-s*.5,s*.4,-s*.3,s*.55,-s*.45);
      p.endShape();
      // tower marks
      p.fill(166,94,68,60);
      p.rect(-s*.5-s*.03,-s*.15,s*.06,s*.1);
      p.rect(s*.1-s*.03,-s*.4,s*.06,s*.1);
      p.rect(s*.55-s*.03,-s*.5,s*.06,s*.1);
      p.noFill();
      break;
    case 'taj':
      // Taj Mahal - dome and minarets
      // main dome
      p.beginShape();
      p.vertex(-s*.2,0);p.vertex(-s*.2,-s*.35);
      p.bezierVertex(-s*.2,-s*.7,s*.2,-s*.7,s*.2,-s*.35);
      p.vertex(s*.2,0);
      p.endShape();
      // spire
      p.line(0,-s*.7,0,-s*.85);
      // minarets
      p.line(-s*.35,0,-s*.35,-s*.5);p.line(s*.35,0,s*.35,-s*.5);
      p.ellipse(-s*.35,-s*.52,s*.04,s*.06);p.ellipse(s*.35,-s*.52,s*.04,s*.06);
      // base
      p.line(-s*.42,0,s*.42,0);
      break;
    case 'moai':
      // Moai - more detailed face
      p.fill(200,197,189,40);
      p.beginShape();
      p.vertex(-s*.15,0);p.vertex(-s*.18,-s*.3);p.vertex(-s*.2,-s*.5);
      p.vertex(-s*.16,-s*.7);p.vertex(-s*.12,-s*.85);
      p.vertex(0,-s*.9);p.vertex(s*.12,-s*.85);p.vertex(s*.16,-s*.7);
      p.vertex(s*.2,-s*.5);p.vertex(s*.18,-s*.3);p.vertex(s*.15,0);
      p.endShape(p.CLOSE);
      p.noFill();
      // brow
      p.line(-s*.12,-s*.65,s*.12,-s*.65);
      // nose
      p.line(0,-s*.6,0,-s*.35);
      p.line(-s*.05,-s*.35,s*.05,-s*.35);
      // eyes
      p.ellipse(-s*.07,-s*.58,s*.06,s*.03);
      p.ellipse(s*.07,-s*.58,s*.06,s*.03);
      break;
    case 'marina':
      // Marina Bay Sands - 3 towers + skypark
      p.line(-s*.3,0,-s*.25,-s*.7);
      p.line(-s*.05,0,0,-s*.7);
      p.line(s*.2,0,s*.25,-s*.7);
      // skypark on top
      p.beginShape();p.noFill();
      p.vertex(-s*.35,-s*.72);
      p.bezierVertex(-s*.2,-s*.78,s*.2,-s*.78,s*.35,-s*.72);
      p.endShape();
      p.line(-s*.35,-s*.72,s*.35,-s*.72);
      break;
    case 'hollywood':
      // Hollywood sign on hillside
      p.strokeWeight(sw*0.7);
      // Hill silhouette
      p.beginShape();p.noFill();
      p.vertex(-s*.6,0);
      p.bezierVertex(-s*.4,-s*.25,s*.1,-s*.35,s*.6,-s*.1);
      p.endShape();
      // Letters "HOLLYWOOD" simplified as vertical strokes on hill
      var hx0=-s*.42, hy0=-s*.18, hsp=s*.09, hh=s*.18;
      for(var hi=0;hi<9;hi++){
        var hxi=hx0+hi*hsp;
        var hyi=hy0-Math.sin((hi/8)*Math.PI)*s*.08;
        p.line(hxi,hyi,hxi,hyi-hh);
        // H crossbar on 1st,5th; W peaks on 5th; O circle on 5th,8th
        if(hi===0||hi===6){p.line(hxi-s*.01,hyi-hh*.5,hxi+s*.04,hyi-hh*.5);}
        if(hi===4){p.line(hxi,hyi-hh,hxi+s*.02,hyi-hh*.6);p.line(hxi+s*.02,hyi-hh*.6,hxi+s*.04,hyi-hh);}
      }
      p.strokeWeight(sw);
      break;
    case 'lalibela':
      // Rock-hewn church of Lalibela - cross-shaped, carved into rock
      // Outer pit
      p.strokeWeight(sw*1.2);
      p.rect(-s*.45,-s*.95,s*.9,s*.9);
      // Large cross shape - thick lines
      p.strokeWeight(sw*1.5);
      // Vertical bar of cross
      p.line(0,-s*.9,0,-s*.15);
      // Horizontal bar of cross
      p.line(-s*.3,-s*.6,s*.3,-s*.6);
      // Inner cross outline (the stepped shape)
      p.strokeWeight(sw*0.8);
      p.beginShape();p.noFill();
      p.vertex(-s*.12,-s*.85);p.vertex(s*.12,-s*.85);
      p.vertex(s*.12,-s*.72);p.vertex(s*.28,-s*.72);
      p.vertex(s*.28,-s*.48);p.vertex(s*.12,-s*.48);
      p.vertex(s*.12,-s*.2);p.vertex(-s*.12,-s*.2);
      p.vertex(-s*.12,-s*.48);p.vertex(-s*.28,-s*.48);
      p.vertex(-s*.28,-s*.72);p.vertex(-s*.12,-s*.72);
      p.endShape(p.CLOSE);
      p.strokeWeight(sw);
      break;
    case 'elephant':
      // African elephant side view
      p.strokeWeight(sw*0.8);
      // Body oval
      p.beginShape();p.noFill();
      p.vertex(s*.1,-s*.3);
      p.bezierVertex(s*.35,-s*.55,-s*.35,-s*.55,-s*.1,-s*.3);
      p.bezierVertex(-s*.35,-s*.15,s*.35,-s*.15,s*.1,-s*.3);
      p.endShape();
      // Head
      p.beginShape();p.noFill();
      p.vertex(s*.1,-s*.4);
      p.bezierVertex(s*.25,-s*.5,s*.35,-s*.55,s*.35,-s*.45);
      p.bezierVertex(s*.38,-s*.35,s*.3,-s*.3,s*.2,-s*.25);
      p.endShape();
      // Trunk curling down
      p.beginShape();p.noFill();
      p.vertex(s*.35,-s*.45);
      p.bezierVertex(s*.42,-s*.35,s*.4,-s*.15,s*.32,-s*.05);
      p.bezierVertex(s*.28,0,s*.25,-s*.05,s*.28,-s*.1);
      p.endShape();
      // Ear
      p.beginShape();p.noFill();
      p.vertex(s*.18,-s*.45);
      p.bezierVertex(s*.12,-s*.5,s*.08,-s*.4,s*.15,-s*.35);
      p.endShape();
      // Legs (4)
      p.line(-s*.2,-s*.2,-s*.22,0);
      p.line(-s*.08,-s*.2,-s*.06,0);
      p.line(s*.05,-s*.2,s*.03,0);
      p.line(s*.15,-s*.22,s*.13,0);
      // Tail
      p.line(-s*.3,-s*.35,-s*.38,-s*.25);
      // Tusk
      p.line(s*.3,-s*.38,s*.35,-s*.3);
      p.strokeWeight(sw);
      break;
    case 'djenne':
      // Great Mosque of Djenné - mud brick facade with protruding beams
      // Main facade wall
      p.line(-s*.4,0,s*.4,0);
      p.line(-s*.4,0,-s*.4,-s*.6);p.line(s*.4,0,s*.4,-s*.6);
      // Three towers (minarets)
      p.line(-s*.3,-s*.6,-s*.3,-s*.9);p.line(-s*.25,-s*.6,-s*.25,-s*.9);
      p.line(-s*.275,-s*.9,-s*.275,-s*.95);// pinnacle
      p.line(-s*.05,-s*.6,-s*.05,-s*.85);p.line(s*.05,-s*.6,s*.05,-s*.85);
      p.line(0,-s*.85,0,-s*.9);// pinnacle
      p.line(s*.25,-s*.6,s*.25,-s*.9);p.line(s*.3,-s*.6,s*.3,-s*.9);
      p.line(s*.275,-s*.9,s*.275,-s*.95);// pinnacle
      // Protruding wooden beams (toron) - horizontal sticks poking out
      for(var ti=-3;ti<=3;ti++){
        var tx=ti*s*.1;
        p.line(tx-s*.05,-s*.2,tx+s*.05,-s*.2);
        p.line(tx-s*.04,-s*.4,tx+s*.04,-s*.4);
      }
      // Top crenellation
      p.line(-s*.4,-s*.6,s*.4,-s*.6);
      break;
    case 'chichenitza':
      // El Castillo pyramid at Chichén Itzá - stepped pyramid
      // Base
      p.line(-s*.5,0,s*.5,0);
      // Steps (5 levels)
      var py0=0;
      for(var si=0;si<5;si++){
        var pw=s*(.5-.08*si), ph=s*.14;
        p.line(-pw,py0,-pw,py0-ph);
        p.line(pw,py0,pw,py0-ph);
        p.line(-pw,py0-ph,pw,py0-ph);
        py0-=ph;
      }
      // Temple on top
      p.rect(-s*.08,py0,s*.16,-s*.12);
      // Door
      p.line(-s*.03,py0,s*.03,py0);
      p.line(-s*.03,py0,-s*.03,py0-s*.08);
      p.line(s*.03,py0,s*.03,py0-s*.08);
      break;
    case 'basil':
      // St. Basil's Cathedral - onion domes
      // Main tower
      p.line(-s*.06,0,-s*.06,-s*.5);p.line(s*.06,0,s*.06,-s*.5);
      p.line(-s*.06,-s*.5,s*.06,-s*.5);
      // Central onion dome
      p.beginShape();p.noFill();
      p.vertex(0,-s*.9);
      p.bezierVertex(-s*.12,-s*.8,-s*.1,-s*.6,-s*.08,-s*.55);
      p.endShape();
      p.beginShape();p.noFill();
      p.vertex(0,-s*.9);
      p.bezierVertex(s*.12,-s*.8,s*.1,-s*.6,s*.08,-s*.55);
      p.endShape();
      p.line(0,-s*.9,0,-s*.95);// cross
      p.line(-s*.03,-s*.92,s*.03,-s*.92);
      // Left dome (smaller)
      p.line(-s*.2,0,-s*.2,-s*.35);p.line(-s*.12,0,-s*.12,-s*.35);
      p.beginShape();p.noFill();
      p.vertex(-s*.16,-s*.6);
      p.bezierVertex(-s*.24,-s*.52,-s*.22,-s*.4,-s*.2,-s*.37);
      p.endShape();
      p.beginShape();p.noFill();
      p.vertex(-s*.16,-s*.6);
      p.bezierVertex(-s*.08,-s*.52,-s*.1,-s*.4,-s*.12,-s*.37);
      p.endShape();
      // Right dome (smaller)
      p.line(s*.2,0,s*.2,-s*.35);p.line(s*.12,0,s*.12,-s*.35);
      p.beginShape();p.noFill();
      p.vertex(s*.16,-s*.6);
      p.bezierVertex(s*.24,-s*.52,s*.22,-s*.4,s*.2,-s*.37);
      p.endShape();
      p.beginShape();p.noFill();
      p.vertex(s*.16,-s*.6);
      p.bezierVertex(s*.08,-s*.52,s*.1,-s*.4,s*.12,-s*.37);
      p.endShape();
      break;
  }
  p.pop();
}

function drawRadarChart(p,pat,cx,cy,radius){
  const labels=['Hardness','Interlace','Face Bal','Diag Tend','Dir Bias','Float Var'];
  const keys=['hardness','interlacement','face_balance','diagonal_tendency','directional_bias','float_variance'];
  const vals=pat?keys.map(k=>pat[k]!==undefined?pat[k]:0.5):[.5,.5,.5,.5,.5,.5];
  p.push();p.noFill();
  for(let ring=1;ring<=5;ring++){const r=radius*ring/5;p.stroke(224,221,213,150);p.strokeWeight(.5);p.beginShape();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.vertex(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}p.endShape(p.CLOSE);}
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.stroke(200,197,189);p.strokeWeight(.5);p.line(cx,cy,cx+Math.cos(a)*radius,cy+Math.sin(a)*radius);}
  p.fill(166,94,68,40);p.stroke(166,94,68);p.strokeWeight(1.5);p.beginShape();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.vertex(cx+Math.cos(a)*radius*vals[i],cy+Math.sin(a)*radius*vals[i]);}p.endShape(p.CLOSE);
  p.noStroke();p.fill(166,94,68);for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.ellipse(cx+Math.cos(a)*radius*vals[i],cy+Math.sin(a)*radius*vals[i],6,6);}
  p.fill(100);p.textSize(9);p.textAlign(p.CENTER,p.CENTER);for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.text(labels[i],cx+Math.cos(a)*(radius+22),cy+Math.sin(a)*(radius+22));}
  p.fill(44);p.textSize(8);for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/2;p.text((vals[i]*100).toFixed(0)+'%',cx+Math.cos(a)*radius*vals[i],cy+Math.sin(a)*radius*vals[i]-10);}
  p.pop();
}
function drawDraftTile(p,dd,x,y,sz){if(!dd)return;const h=dd.length,w=dd[0].length,cw=sz/w,ch=sz/h;p.noStroke();for(let r=0;r<h;r++)for(let c=0;c<w;c++){p.fill(dd[r][c]?44:244);p.rect(x+c*cw,y+r*ch,cw+.5,ch+.5);}}

function initLandmarkButtons(){
  const container=document.getElementById('gl-landmarks');
  LANDMARK_PRESETS.forEach(lm=>{
    const btn=document.createElement('button');
    btn.textContent=lm.label;
    btn.addEventListener('click',()=>{
      document.getElementById('gl-lat').value=lm.lat;
      document.getElementById('gl-lng').value=lm.lng;
      generateFromForm();
    });
    container.appendChild(btn);
  });
}
function generateFromForm(){
  const latEl=document.getElementById('gl-lat');
  const lngEl=document.getElementById('gl-lng');
  const lat=parseFloat(latEl.value);
  const lng=parseFloat(lngEl.value);
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){
    showToast('有効な緯度(-90〜90)・経度(-180〜180)を入力してください');
    return;
  }
  selectedLat=lat;selectedLng=lng;
  patternSwaps=[];
  genProgress=0.001;garmentData=null;garmentImage=null;
  selectedDraftIdx=-1;
}
function generateFromCode(){
  const code=document.getElementById('gl-code-input').value.trim();
  const parsed=parsePatternCode(code);
  if(!parsed){showToast('無効なパターンコードです');return;}
  document.getElementById('gl-lat').value=parsed.lat;
  document.getElementById('gl-lng').value=parsed.lng;
  selectedLat=parsed.lat;selectedLng=parsed.lng;
  patternSwaps=[];
  genProgress=0.001;garmentData=null;garmentImage=null;
  selectedDraftIdx=-1;
}
function syncFormFromMap(lat,lng){
  document.getElementById('gl-lat').value=lat.toFixed(4);
  document.getElementById('gl-lng').value=lng.toFixed(4);
}
function showToast(msg){
  const t=document.getElementById('gl-toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function showConfirmation(){
  if(!garmentData)return;
  const gd=garmentData;
  const code=generatePatternCode(gd.lat,gd.lng,gd.seed);
  const latStr=gd.lat>=0?gd.lat.toFixed(4)+'\u00b0N':(-gd.lat).toFixed(4)+'\u00b0S';
  const lngStr=gd.lng>=0?gd.lng.toFixed(4)+'\u00b0E':(-gd.lng).toFixed(4)+'\u00b0W';

  // Render pattern image to data URL
  const canvas=document.createElement('canvas');
  canvas.width=gd.w;canvas.height=gd.h;
  const ctx=canvas.getContext('2d');
  const img=garmentImage;
  img.loadPixels();
  const imgData=ctx.createImageData(gd.w,gd.h);
  for(let i=0;i<img.pixels.length;i++)imgData.data[i]=img.pixels[i];
  ctx.putImageData(imgData,0,0);
  const dataURL=canvas.toDataURL('image/png');

  // Org names
  const orgNames=gd.patterns.map((p,i)=>'#'+(i+1)+' '+(p.name||p.id)+' ('+(p.hardness*100).toFixed(0)+'%)');

  const FORM_ID='1hODLx67wbSE8L2HHnUE7YE-0hU_ZOgsXqR8AgbHzWZg';
  const ENTRY_PATTERN_CODE='entry.1278891706';
  const orderURL='https://docs.google.com/forms/d/'+FORM_ID+'/viewform?usp=pp_url&'+ENTRY_PATTERN_CODE+'='+encodeURIComponent(code);

  const panel=document.getElementById('gl-confirm-panel');
  panel.innerHTML=`
    <h2>パターン確認</h2>
    <img src="${dataURL}" class="gl-confirm-image" alt="Generated pattern">
    <dl class="gl-confirm-details">
      <dt>座標</dt>
      <dd>${latStr}, ${lngStr}</dd>
      <dt>パターンコード</dt>
      <dd><span class="gl-confirm-code" id="gl-code-display">${code}</span></dd>
      <dt>使用組織</dt>
      <dd><ul class="gl-orgs-list">${orgNames.map(n=>'<li>'+n+'</li>').join('')}</ul></dd>
      <dt>シード値</dt>
      <dd style="font-size:12px;color:#888;">${gd.seed}</dd>
    </dl>
    <p style="font-size:11px;color:#999;text-align:center;margin-top:20px;line-height:1.7;">
      実際の製品は手織り・手縫製のため、画面上のパターンと仕上がりは完全には一致しません。<br>
      織りの揺らぎや素材の表情も、一点ものの個性としてお楽しみください。
    </p>
    <div class="gl-confirm-actions">
      <button class="gl-btn-secondary" onclick="downloadPattern()">画像ダウンロード</button>
      <button class="gl-btn-primary" onclick="copyCode()">コードをコピー</button>
      <button class="gl-btn-cart" onclick="window.open('${orderURL}','_blank')">注文フォームへ</button>
      <button class="gl-btn-secondary" onclick="closeConfirmation()">閉じる</button>
    </div>
  `;
  document.getElementById('gl-confirm-overlay').classList.add('active');
}
function closeConfirmation(){
  document.getElementById('gl-confirm-overlay').classList.remove('active');
}

function downloadPattern(){
  if(!garmentData||!garmentImage)return;
  const gd=garmentData;
  const canvas=document.createElement('canvas');
  canvas.width=gd.w;canvas.height=gd.h;
  const ctx=canvas.getContext('2d');
  garmentImage.loadPixels();
  const imgData=ctx.createImageData(gd.w,gd.h);
  for(let i=0;i<garmentImage.pixels.length;i++)imgData.data[i]=garmentImage.pixels[i];
  ctx.putImageData(imgData,0,0);
  const code=generatePatternCode(gd.lat,gd.lng,gd.seed);
  const a=document.createElement('a');a.download='genius-loci-'+code+'.png';a.href=canvas.toDataURL('image/png');a.click();
}
function copyCode(){
  if(!garmentData)return;
  const code=generatePatternCode(garmentData.lat,garmentData.lng,garmentData.seed);
  navigator.clipboard.writeText(code).then(()=>showToast('コピーしました: '+code)).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');ta.value=code;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピーしました: '+code);
  });
}

// ═══════ P5 SKETCH ═══════
const sketch=(p)=>{
  const CANVAS_W=1400,CANVAS_H=880;
  let W,H;window._p5inst=p;
  let prevSelIdx=-2;

  p.setup=()=>{
    W=CANVAS_W;H=CANVAS_H;
    const cnv=p.createCanvas(W,H);
    cnv.parent('gl-canvas-container');
    p.textFont('YuMincho');p.pixelDensity(2);
  };

  p.draw=()=>{
    if(!wifArchive||galleryOpen){p.background(244,241,232);return;}
    // Advance generating progress
    if(phase==='combined'&&genProgress>0&&genProgress<1){
      genProgress+=0.004;
      if(genProgress>=1){
        garmentData=generateGarmentPattern(p,selectedLat,selectedLng,GW,GH);
        garmentImage=renderGarmentImage(p,garmentData,-1);
        selectedDraftIdx=-1;prevSelIdx=-1;
      }
    }
    if(garmentData&&(prevSelIdx!==selectedDraftIdx||needsRerender)){garmentImage=renderGarmentImage(p,garmentData,selectedDraftIdx);prevSelIdx=selectedDraftIdx;needsRerender=false;}
    p.background(244,241,232);
    if(phase==='combined')drawCombined(p);
  };

  // ── Layout helpers ──
  function getDivX(){return Math.round(W*0.48);}
  function getMapBounds(divX){
    const m=16,startX=divX+10;
    return{mx:startX+m,my:m+28,mw:W-startX-m*2,mh:H-m*2-42};
  }
  function getTileHit(mx,my){
    if(!garmentData)return -1;
    const divX=getDivX(),mg=10,gd=garmentData;
    const maxGW=divX-mg*2,maxGH=H*0.62;
    const gScale=Math.min(maxGW/gd.w,maxGH/gd.h);
    const gw=gd.w*gScale,gh=gd.h*gScale;
    const gx=(divX-gw)/2,gy=mg+2;
    const barY=gy+gh+16;
    const ts=34,gap=3;
    const tY=barY+20;
    const totalTW=gd.patterns.length*(ts+gap)-gap;
    const tStartX=(divX-totalTW)/2;
    for(let i=0;i<gd.patterns.length;i++){
      const tx=tStartX+i*(ts+gap),ty=tY;
      if(mx>=tx&&mx<=tx+ts&&my>=ty&&my<=ty+ts)return i;
    }
    return -1;
  }

  // ══════ COMBINED VIEW ══════
  function drawCombined(p){
    const divX=getDivX();
    p.stroke(224,221,213,100);p.strokeWeight(1);p.line(divX,12,divX,H-12);
    drawMapArea(p,divX);
    if(genProgress>0&&genProgress<1){drawGeneratingArea(p,divX);}
    else if(garmentData&&garmentImage){drawPatternArea(p,divX);}
    else{drawWaitingArea(p,divX);}
    // Order button
    if(garmentData){
      const btnW=120,btnH=30;
      const btnX=(divX-btnW)/2,btnY=H-44;
      p.fill(166,94,68);p.noStroke();p.rect(btnX,btnY,btnW,btnH,15);
      p.fill(255);p.textSize(11);p.textAlign(p.CENTER,p.CENTER);p.text('この柄を注文する',btnX+btnW/2,btnY+btnH/2);
      // Clear button
      const cbx=12,cby=H-42;
      p.fill(244,241,232,200);p.stroke(224,221,213);p.strokeWeight(1);p.rect(cbx,cby,56,28,14);
      p.noStroke();p.fill(136);p.textSize(10);p.textAlign(p.CENTER,p.CENTER);p.text('Clear',cbx+28,cby+14);
    }
  }

  // ── Map (right panel) ──
  function drawMapArea(p,divX){
    const{mx,my,mw,mh}=getMapBounds(divX);
    const centerX=divX+10+(W-divX-10)/2;
    p.noStroke();p.fill(44);p.textSize(12);p.textAlign(p.CENTER,p.TOP);
    p.text('地図をクリックして座標を選ぶ',centerX,10);
    // Grid
    p.stroke(224,221,213,80);p.strokeWeight(.3);
    for(let lat=-60;lat<=80;lat+=20){const{y}=lngLatToXY(0,lat,mx,my,mw,mh);p.line(mx,y,mx+mw,y);}
    for(let lng=-180;lng<=180;lng+=30){const{x}=lngLatToXY(lng,0,mx,my,mw,mh);p.line(x,my,x,my+mh);}
    // Continents fill
    p.noStroke();p.fill(210,207,199,50);
    for(const c of continents){p.beginShape();for(const[lng,lat]of c.path){const{x,y}=lngLatToXY(lng,lat,mx,my,mw,mh);p.vertex(x,y);}p.endShape(p.CLOSE);}
    // Continents outline
    p.noFill();p.stroke(180,177,169);p.strokeWeight(.8);
    for(const c of continents){p.beginShape();for(const[lng,lat]of c.path){const{x,y}=lngLatToXY(lng,lat,mx,my,mw,mh);p.vertex(x,y);}p.endShape(p.CLOSE);}
    // Landmarks
    const lmScale=Math.min(mw,mh)*0.032;
    for(const lm of landmarks){
      const pos=lngLatToXY(lm.lng,lm.lat,mx,my,mw,mh);
      drawLandmark(p,lm.draw,pos.x,pos.y,lmScale);
      p.noStroke();p.fill(166,94,68,160);p.textSize(5.5);p.textAlign(p.CENTER,p.TOP);
      p.text(lm.label,pos.x,pos.y+3);
    }
    // Selected location marker
    if(garmentData||genProgress>0){
      const pos=lngLatToXY(selectedLng,selectedLat,mx,my,mw,mh);
      p.noFill();p.stroke(166,94,68);p.strokeWeight(2);p.ellipse(pos.x,pos.y,14,14);
      p.fill(166,94,68);p.noStroke();p.ellipse(pos.x,pos.y,4,4);
      p.textSize(8);p.textAlign(p.LEFT,p.TOP);
      p.text(selectedLat.toFixed(2)+', '+selectedLng.toFixed(2),pos.x+10,pos.y-4);
    }
    // Crosshair
    if(p.mouseX>mx&&p.mouseX<mx+mw&&p.mouseY>my&&p.mouseY<my+mh){
      p.stroke(166,94,68,60);p.strokeWeight(.5);p.line(p.mouseX,my,p.mouseX,my+mh);p.line(mx,p.mouseY,mx+mw,p.mouseY);
      const{lat,lng}=xyToLngLat(p.mouseX,p.mouseY,mx,my,mw,mh);
      p.noStroke();p.fill(136);p.textSize(9);p.textAlign(p.LEFT,p.TOP);
      p.text(lat.toFixed(4)+', '+lng.toFixed(4),p.mouseX+8,p.mouseY+8);
    }
    p.noStroke();p.fill(160);p.textSize(8);p.textAlign(p.CENTER,p.BOTTOM);
    p.text('地図上の場所をクリック、または上のフォームに座標を入力',centerX,H-10);
  }

  // ── Waiting (left) ──
  function drawWaitingArea(p,divX){
    const mg=10;
    if(v10OrgmapImg&&v10OrgmapImg.complete){
      const imgW=V10_SRC_W,imgH=V10_SRC_H;
      const maxGW=divX-mg*2,maxGH=H*0.62;
      const gScale=Math.min(maxGW/imgW,maxGH/imgH);
      const gw=imgW*gScale,gh=imgH*gScale;
      const gx=(divX-gw)/2,gy=mg+20;
      p.drawingContext.globalAlpha=0.35;
      p.drawingContext.drawImage(v10OrgmapImg,gx,gy,gw,gh);
      p.drawingContext.globalAlpha=1.0;
      p.noStroke();p.fill(180);p.textSize(10);p.textAlign(p.CENTER,p.TOP);
      p.text('座標を選んでください  \u2192',divX/2,gy+gh+16);
      p.textSize(9);p.fill(200);
      p.text('あなたの場所が織物になります',divX/2,gy+gh+34);
    }else{
      const cx=divX/2,cy=H/2;
      p.noStroke();p.fill(180);p.textSize(13);p.textAlign(p.CENTER,p.CENTER);
      p.text('座標を選んでください\n右の地図をクリック  \u2192',cx,cy-16);
    }
  }

  // ── Generating (left) ──
  function drawGeneratingArea(p,divX){
    const cx=divX/2,cy=H/2;
    p.fill(44);p.noStroke();p.textAlign(p.CENTER,p.CENTER);p.textSize(14);
    p.text('織組織を生成しています...',cx,cy-20);
    p.textSize(10);p.fill(136);
    p.text(selectedLat.toFixed(4)+', '+selectedLng.toFixed(4),cx,cy+8);
    const barW=divX*0.6,barX=cx-barW/2;
    p.fill(224,221,213);p.rect(barX,cy+28,barW,3,2);
    p.fill(166,94,68);p.rect(barX,cy+28,barW*genProgress,3,2);
    p.fill(180);p.textSize(8);
    p.text(genProgress<.3?'アーカイブからパターンを選択中...':genProgress<.6?GW+'\u00d7'+GH+' の織景観を生成中...':'織組織を配置しています...',cx,cy+52);
  }

  // ── Pattern + Draft + Radar (left) ──
  function drawPatternArea(p,divX){
    if(!garmentData||!garmentImage)return;
    const gd=garmentData;
    const mg=10;
    const maxGW=divX-mg*2,maxGH=H*0.62;
    const gScale=Math.min(maxGW/gd.w,maxGH/gd.h);
    const gw=gd.w*gScale,gh=gd.h*gScale;
    const gx=(divX-gw)/2,gy=mg+2;
    p.image(garmentImage,gx,gy,gw,gh);
    // Hover cursor hint for garment image
    if(p.mouseX>=gx&&p.mouseX<=gx+gw&&p.mouseY>=gy&&p.mouseY<=gy+gh){p.cursor(p.HAND);}
    // Coords + code
    const code=generatePatternCode(gd.lat,gd.lng,gd.seed);
    p.noStroke();p.fill(136);p.textSize(8);p.textAlign(p.CENTER,p.TOP);
    p.text(gd.lat.toFixed(4)+', '+gd.lng.toFixed(4)+'  |  '+code,divX/2,gy+gh+3);
    // Spectrum bar
    const barY=gy+gh+16;
    const barW=gw*0.65,barX=(divX-barW)/2;
    for(let i=0;i<barW;i++){p.stroke(Math.floor(255*(1-i/barW)));p.line(barX+i,barY,barX+i,barY+4);}
    p.noStroke();p.fill(160);p.textSize(5.5);
    p.textAlign(p.LEFT,p.TOP);p.text('SOFT',barX,barY+6);
    p.textAlign(p.RIGHT,p.TOP);p.text('HARD',barX+barW,barY+6);
    // Draft tile selector
    const ts=34,gap=3;
    const tY=barY+20;
    const totalTW=gd.patterns.length*(ts+gap)-gap;
    const tStartX=(divX-totalTW)/2;
    p.textAlign(p.CENTER,p.BOTTOM);p.fill(100);p.textSize(8);
    p.text('Draft Selector  (click / double-click)',divX/2,tY-2);
    hoverDraftIdx=-1;
    for(let i=0;i<gd.patterns.length;i++){
      const tx=tStartX+i*(ts+gap),ty=tY;
      if(p.mouseX>=tx&&p.mouseX<=tx+ts&&p.mouseY>=ty&&p.mouseY<=ty+ts)hoverDraftIdx=i;
      if(i===selectedDraftIdx){p.fill(166,94,68,30);p.stroke(166,94,68);p.strokeWeight(2);}
      else if(i===hoverDraftIdx){p.fill(244,241,232);p.stroke(180);p.strokeWeight(1);}
      else{p.fill(250);p.stroke(224,221,213);p.strokeWeight(1);}
      p.rect(tx,ty,ts,ts,2);
      drawDraftTile(p,gd.patterns[i].drawdown,tx+2,ty+2,ts-4);
      p.noStroke();p.fill(100);p.textSize(5.5);p.textAlign(p.CENTER,p.TOP);
      p.text('#'+(i+1)+'  '+(gd.patterns[i].hardness*100).toFixed(0)+'%',tx+ts/2,ty+ts+1);
      if(i<slotCandidates.length&&slotCandidates[i].candidateCount>1){
        p.fill(124,134,107);p.noStroke();p.ellipse(tx+ts-2,ty+2,12,12);
        p.fill(255);p.textSize(5);p.textAlign(p.CENTER,p.CENTER);
        const cnt=slotCandidates[i].candidateCount;p.text(cnt>999?(cnt/1000).toFixed(0)+'k':cnt>99?'99+':cnt,tx+ts-2,ty+2);
      }
    }
    // Selected draft detail + Radar
    const detailY=tY+ts+20;
    const detailH=H-detailY-50;
    if(selectedDraftIdx>=0){
      const ap=gd.patterns[selectedDraftIdx];
      const draftSz=Math.min(detailH-24,divX*0.30);
      const draftX=mg+4;
      const draftY=detailY;
      p.fill(250);p.stroke(224,221,213);p.strokeWeight(1);
      p.rect(draftX,draftY,draftSz,draftSz,4);
      drawDraftTile(p,ap.drawdown,draftX+4,draftY+4,draftSz-8);
      p.noStroke();p.fill(44);p.textSize(8);p.textAlign(p.CENTER,p.TOP);
      p.text('#'+(selectedDraftIdx+1),draftX+draftSz/2,draftY+draftSz+3);
      p.fill(160);p.textSize(7);
      p.text(ap.width+'\u00d7'+ap.height+'  H:'+(ap.hardness*100).toFixed(0)+'%',draftX+draftSz/2,draftY+draftSz+14);
      const radarAreaX=draftX+draftSz+8;
      const radarAreaW=divX-radarAreaX-mg;
      const rR=Math.min(radarAreaW/2-22,draftSz/2-4,60);
      const rcx=radarAreaX+radarAreaW/2;
      const rcy=draftY+Math.min(draftSz,rR*2+44)/2;
      drawRadarChart(p,ap,rcx,rcy,rR);
    }else{
      p.noStroke();p.fill(180);p.textSize(10);p.textAlign(p.CENTER,p.CENTER);
      p.text('ドラフトタイルをクリック\nで詳細を表示',divX/2,detailY+detailH/2);
    }
  }

  // ══════ INTERACTION ══════
  let lastTapTime=0,lastTapIdx=-1;
  p.mousePressed=()=>{
    if(!wifArchive||galleryOpen)return;
    if(phase==='combined'){
      const divX=getDivX();
      // Right panel: map click
      if(p.mouseX>divX){
        const{mx,my,mw,mh}=getMapBounds(divX);
        if(p.mouseX>mx&&p.mouseX<mx+mw&&p.mouseY>my&&p.mouseY<my+mh){
          const{lat,lng}=xyToLngLat(p.mouseX,p.mouseY,mx,my,mw,mh);
          selectedLat=lat;selectedLng=lng;
          syncFormFromMap(lat,lng);
          patternSwaps=[];
          genProgress=0.001;garmentData=null;garmentImage=null;
          selectedDraftIdx=-1;prevSelIdx=-2;
        }
        return;
      }
      // Left panel
      if(garmentData){
        // Order button
        const btnW=120,btnH=30;
        const btnX=(divX-btnW)/2,btnY=H-44;
        if(p.mouseX>=btnX&&p.mouseX<=btnX+btnW&&p.mouseY>=btnY&&p.mouseY<=btnY+btnH){
          showConfirmation();return;
        }
        // Clear button
        const cbx=12,cby=H-42;
        if(p.mouseX>=cbx&&p.mouseX<=cbx+56&&p.mouseY>=cby&&p.mouseY<=cby+28){
          garmentData=null;garmentImage=null;
          genProgress=0;selectedDraftIdx=-1;prevSelIdx=-2;
          return;
        }
        // Garment image click → lightbox
        {const gd=garmentData,mg=10;
        const maxGW=divX-mg*2,maxGH=H*0.62;
        const gScale=Math.min(maxGW/gd.w,maxGH/gd.h);
        const gw=gd.w*gScale,gh=gd.h*gScale;
        const gx=(divX-gw)/2,gy=mg+2;
        if(p.mouseX>=gx&&p.mouseX<=gx+gw&&p.mouseY>=gy&&p.mouseY<=gy+gh){showLightbox();return;}}
        // Draft tile
        const tappedIdx=getTileHit(p.mouseX,p.mouseY);
        if(tappedIdx>=0){
          const now=Date.now();
          if(tappedIdx===lastTapIdx&&now-lastTapTime<600){openGallery(tappedIdx);lastTapTime=0;lastTapIdx=-1;}
          else{selectedDraftIdx=(selectedDraftIdx===tappedIdx)?-1:tappedIdx;lastTapTime=now;lastTapIdx=tappedIdx;}
        }
      }
    }
  };
  p.touchStarted=(e)=>{
    if(galleryOpen)return true;
    if(p.touches&&p.touches.length>0){p.mouseX=p.touches[0].x;p.mouseY=p.touches[0].y;}
    p.mousePressed();return false;
  };
};

// ═══════ INIT ═══════
document.addEventListener('DOMContentLoaded',()=>{
  // Set loading logo from header logo
  const headerLogo=document.querySelector('.gl-logo');
  if(headerLogo)document.getElementById('gl-loading-logo').src=headerLogo.src;
  initLandmarkButtons();
  new p5(sketch);
  tryAutoLoad();
  // Close confirm overlay on outside click
  document.getElementById('gl-confirm-overlay').addEventListener('click',(e)=>{
    if(e.target===document.getElementById('gl-confirm-overlay'))closeConfirmation();
  });
});
</script>
